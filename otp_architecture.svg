<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="monospace, sans-serif">

  <!-- Background -->
  <rect width="900" height="620" fill="#1C0F0A"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#C4602A" font-size="18" font-weight="bold">BrewSecure — OTP Service Architecture</text>
  <text x="450" y="60" text-anchor="middle" fill="#888" font-size="12">otp.brewsecure.store · 172.104.252.217</text>

  <!-- ── User ── -->
  <rect x="30" y="100" width="140" height="60" rx="8" fill="#2a1a12" stroke="#C4602A" stroke-width="1.5"/>
  <text x="100" y="127" text-anchor="middle" fill="#f0e0d0" font-size="13" font-weight="bold">User</text>
  <text x="100" y="148" text-anchor="middle" fill="#888" font-size="11">(via ElevenLabs)</text>

  <!-- ── ElevenLabs Agent ── -->
  <rect x="30" y="260" width="140" height="60" rx="8" fill="#2a1a12" stroke="#C4602A" stroke-width="1.5"/>
  <text x="100" y="285" text-anchor="middle" fill="#f0e0d0" font-size="13" font-weight="bold">AI Agent</text>
  <text x="100" y="305" text-anchor="middle" fill="#888" font-size="11">ElevenLabs</text>

  <!-- ── OTP Service box ── -->
  <rect x="310" y="180" width="280" height="220" rx="10" fill="#231008" stroke="#C4602A" stroke-width="2"/>
  <text x="450" y="205" text-anchor="middle" fill="#C4602A" font-size="13" font-weight="bold">OTP Service</text>
  <text x="450" y="222" text-anchor="middle" fill="#666" font-size="10">otp.brewsecure.store · Node 25 + Express</text>

  <!-- Endpoints inside box -->
  <rect x="330" y="235" width="240" height="32" rx="5" fill="#1a0c06" stroke="#555" stroke-width="1"/>
  <text x="345" y="255" fill="#4CAF50" font-size="11" font-weight="bold">POST</text>
  <text x="390" y="255" fill="#f0e0d0" font-size="11">/otp/request</text>
  <text x="555" y="255" text-anchor="end" fill="#888" font-size="10">{ email }</text>

  <rect x="330" y="277" width="240" height="32" rx="5" fill="#1a0c06" stroke="#555" stroke-width="1"/>
  <text x="345" y="297" fill="#4CAF50" font-size="11" font-weight="bold">POST</text>
  <text x="390" y="297" fill="#f0e0d0" font-size="11">/otp/match</text>
  <text x="555" y="297" text-anchor="end" fill="#888" font-size="10">{ sessionOTP, userOTP }</text>

  <rect x="330" y="319" width="240" height="32" rx="5" fill="#1a0c06" stroke="#555" stroke-width="1"/>
  <text x="345" y="339" fill="#4CAF50" font-size="11" font-weight="bold">POST</text>
  <text x="390" y="339" fill="#f0e0d0" font-size="11">/otp/verify</text>
  <text x="555" y="339" text-anchor="end" fill="#888" font-size="10">{ email, otp }</text>

  <!-- In-memory store -->
  <rect x="330" y="362" width="240" height="26" rx="5" fill="#1a0c06" stroke="#444" stroke-width="1" stroke-dasharray="4"/>
  <text x="450" y="379" text-anchor="middle" fill="#666" font-size="10">In-memory store · 5 min TTL · single-use</text>

  <!-- ── Webhook ── -->
  <rect x="680" y="180" width="180" height="60" rx="8" fill="#2a1a12" stroke="#f0a030" stroke-width="1.5"/>
  <text x="770" y="205" text-anchor="middle" fill="#f0e0d0" font-size="13" font-weight="bold">Webhook</text>
  <text x="770" y="222" text-anchor="middle" fill="#888" font-size="10">go.webhooks.cc</text>
  <text x="770" y="236" text-anchor="middle" fill="#666" font-size="10">(mock email delivery)</text>

  <!-- ── BrewSecure API ── -->
  <rect x="680" y="320" width="180" height="60" rx="8" fill="#2a1a12" stroke="#5599ff" stroke-width="1.5"/>
  <text x="770" y="345" text-anchor="middle" fill="#f0e0d0" font-size="13" font-weight="bold">BrewSecure API</text>
  <text x="770" y="362" text-anchor="middle" fill="#888" font-size="10">shop.brewsecure.store</text>
  <text x="770" y="378" text-anchor="middle" fill="#666" font-size="10">/api/orders/by-email</text>

  <!-- ─── Arrows ─── -->

  <!-- User → Agent: "access my orders" -->
  <line x1="100" y1="160" x2="100" y2="258" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="108" y="215" fill="#aaa" font-size="10">access my orders</text>

  <!-- Agent → OTP Service: POST /otp/request -->
  <line x1="170" y1="280" x2="308" y2="255" stroke="#C4602A" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="195" y="262" fill="#C4602A" font-size="10">POST /otp/request</text>

  <!-- OTP Service → Agent: 200 + otp -->
  <line x1="308" y1="270" x2="170" y2="292" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="192" y="290" fill="#4CAF50" font-size="10">200 { otp }</text>

  <!-- OTP Service → Webhook: parallel fire -->
  <line x1="590" y1="222" x2="678" y2="215" stroke="#f0a030" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowYellow)"/>
  <text x="598" y="208" fill="#f0a030" font-size="10">parallel · { email, otp }</text>

  <!-- User → Agent: "my code is 123456" -->
  <line x1="170" y1="310" x2="310" y2="310" stroke="#C4602A" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="185" y="305" fill="#C4602A" font-size="10">POST /otp/match</text>

  <!-- OTP Service → BrewSecure: fetch orders -->
  <line x1="590" y1="340" x2="678" y2="350" stroke="#5599ff" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="596" y="334" fill="#5599ff" font-size="10">200 → fetch orders</text>

  <!-- ─── Legend ─── -->
  <rect x="30" y="450" width="840" height="140" rx="8" fill="#231008" stroke="#333" stroke-width="1"/>
  <text x="50" y="475" fill="#C4602A" font-size="12" font-weight="bold">Flow</text>

  <text x="50" y="498" fill="#aaa" font-size="11">1.</text>
  <text x="65" y="498" fill="#f0e0d0" font-size="11">User asks agent to access orders → Agent calls POST /otp/request with user email</text>

  <text x="50" y="518" fill="#aaa" font-size="11">2.</text>
  <text x="65" y="518" fill="#f0e0d0" font-size="11">Service returns 200 { success, otp } · Webhook fires in parallel with otp + email (mock email)</text>

  <text x="50" y="538" fill="#aaa" font-size="11">3.</text>
  <text x="65" y="538" fill="#f0e0d0" font-size="11">Agent stores sessionOTP · tells user "check your email for a code"</text>

  <text x="50" y="558" fill="#aaa" font-size="11">4.</text>
  <text x="65" y="558" fill="#f0e0d0" font-size="11">User says their code → Agent calls POST /otp/match { sessionOTP, userOTP }</text>

  <text x="50" y="578" fill="#aaa" font-size="11">5.</text>
  <text x="65" y="578" fill="#f0e0d0" font-size="11">200 OK → Agent proceeds to fetch orders from BrewSecure API · 401 → access denied</text>

  <!-- ─── Arrow markers ─── -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C4602A"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4CAF50"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f0a030"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5599ff"/>
    </marker>
  </defs>

</svg>
